global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'ddos-protection'
    static_configs:
      - targets: ['ddos-protection:9090']
        labels:
          service: 'ddos-protection'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
    metrics_path: /scrape
    params:
      target: [redis://redis:6379]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093